<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>T-Weather</title>

    <link rel="stylesheet" href="/static/style.css">

</head>

<body>

<div class="container">

    <header>

        <h1>🌦 T-Weather</h1>

        <p>Hệ thống cảnh báo thời tiết</p>

    </header>

    <div class="card">

        <h2>📍 Khu vực theo dõi</h2>

        <p>GPS cố định từ config.py</p>

    </div>

    <div class="grid">

        <div class="item">
            <h3>🌡 Nhiệt độ</h3>
            <span id="temperature">--</span>
        </div>

        <div class="item">
            <h3>💧 Độ ẩm</h3>
            <span id="humidity">--</span>
        </div>

        <div class="item">
            <h3>🌧 Mưa</h3>
            <span id="rain">--</span>
        </div>

        <div class="item">
            <h3>☁ Mây</h3>
            <span id="cloud">--</span>
        </div>

        <div class="item">
            <h3>☀ UV</h3>
            <span id="uv">--</span>
        </div>

        <div class="item">
            <h3>💨 Gió</h3>
            <span id="wind">--</span>
        </div>

    </div>

    <div class="warning">

        <h2>⚠ Cảnh báo</h2>

        <div id="warnings">

            Không có cảnh báo.

        </div>

    </div>

    <div class="footer">

        Cập nhật:
        <span id="update">--</span>

    </div>

</div>

<script src="/static/script.js"></script>

</body>

</html>
