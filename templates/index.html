<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Weather</title>

<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">

<link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <h1>🌦 T-Weather</h1>
  <p class="subtitle">Hệ thống cảnh báo thời tiết</p>

  <section class="area">
    <h3>📍 Khu vực theo dõi</h3>
    <p>GPS cố định từ config.py</p>
  </section>

  <section class="grid">
    <div class="card">
      <div class="label">🌡 Nhiệt độ</div>
      <div class="value" id="temperature">--</div>
    </div>
    <div class="card">
      <div class="label">💧 Độ ẩm</div>
      <div class="value" id="humidity">--</div>
    </div>
    <div class="card">
      <div class="label">🌧 Xác suất mưa</div>
      <div class="value" id="rain">--</div>
    </div>
    <div class="card">
      <div class="label">☁ Mây</div>
      <div class="value" id="cloud">--</div>
    </div>
    <div class="card">
      <div class="label">☀ UV</div>
      <div class="value" id="uv">--</div>
    </div>
    <div class="card">
      <div class="label">💨 Gió</div>
      <div class="value" id="wind">--</div>
    </div>
  </section>

  <section class="warnings-section">
    <h3>⚠ Cảnh báo</h3>
    <div id="warnings">Đang tải...</div>
  </section>

  <p class="update">Cập nhật: <span id="update">--</span></p>

  <script src="/static/script.js"></script>
</body>
</html>
