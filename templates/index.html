<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Weather</title>

<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">

<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="page">

  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">🌦</div>
      <div>
        <h1>T-Weather</h1>
        <p class="subtitle">Hệ thống cảnh báo thời tiết</p>
      </div>
    </div>
  </header>

  <section class="area">
    <h3>📍 Khu vực theo dõi</h3>
    <p>GPS cố định từ nhà riêng Hữu Tài</p>
  </section>

  <section class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow">Nhiệt độ hiện tại</div>
      <div class="hero-temp"><span id="temperature">--</span></div>
    </div>
    <div class="dial-outer" id="rainDial">
      <div class="dial-inner">
        <div class="dial-num"><span id="rain">--</span></div>
        <div class="dial-label">Mưa</div>
      </div>
    </div>
  </section>

  <section class="grid">
    <div class="card" data-bar="humidity">
      <div class="label">💧 Độ ẩm</div>
      <div class="value"><span id="humidity">--</span></div>
      <div class="bar"><i></i></div>
    </div>
    <div class="card" data-bar="cloud">
      <div class="label">☁ Mây</div>
      <div class="value"><span id="cloud">--</span></div>
      <div class="bar"><i></i></div>
    </div>
    <div class="card" data-bar="uv">
      <div class="label">☀ UV</div>
      <div class="value"><span id="uv">--</span></div>
      <div class="bar"><i></i></div>
    </div>
    <div class="card" data-bar="wind">
      <div class="label">💨 Gió</div>
      <div class="value"><span id="wind">--</span></div>
      <div class="bar"><i></i></div>
    </div>
  </section>

  <section class="warnings-section">
    <h3>⚠ Cảnh báo</h3>
    <div id="warnings">Đang tải...</div>
  </section>

  <p class="update">Cập nhật: <span id="update">--</span></p>

</div>

<script src="/static/script.js"></script>
</body>
</html>
